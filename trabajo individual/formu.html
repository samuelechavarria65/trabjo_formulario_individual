<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            width: 300px;
            text-align: center;
        }

        input{
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button{
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: #0056b3;
        }

        .welcome{
            display: none;
        }

        .error{
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container" id="loginBox">
        <h2>Iniciar Sesión</h2>

        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">

        <button onclick="login()">Entrar</button>

        <p class="error" id="mensajeError"></p>
    </div>

    <div class="container welcome" id="welcomeBox">
        <h2>Bienvenido</h2>
        <h3 id="nombreUsuario"></h3>
    </div>

    <script>
        function login() {

            const usuarioCorrecto = "samuel";
            const passwordCorrecta = "1234";
            let usuario = document.getElementById("usuario").value;
            let password = document.getElementById("password").value;
            if(usuario === usuarioCorrecto && password === passwordCorrecta){
                document.getElementById("loginBox").style.display = "none";

                document.getElementById("welcomeBox").style.display = "block";
                document.getElementById("nombreUsuario").innerHTML = usuario;

            } else {

                document.getElementById("mensajeError").innerHTML =
                    "Usuario o contraseña incorrectos";

            }
        }
    </script>

</body>
</html>
